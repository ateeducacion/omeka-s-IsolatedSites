services:

  omekas:
    image: erseco/alpine-omeka-s:develop
    restart: unless-stopped
    depends_on:
      - mariadb
    ports:
      - "8080:8080"
    environment:
      # Database
      DB_HOST: mariadb
      DB_NAME: omeka
      DB_USER: omeka
      DB_PASSWORD: omeka
      DB_PORT: 3306

      # Admin + site
      OMEKA_ADMIN_EMAIL: admin@example.com
      OMEKA_ADMIN_NAME: "Site Administrator"
      OMEKA_ADMIN_PASSWORD: PLEASE_CHANGEME
      OMEKA_SITE_TITLE: "Omeka S Sample Site"
      # Auto-import sample data CSV on first boot (requires CSVImport module)
      OMEKA_CSV_IMPORT_FILE: /data/sample_data.csv
      # App environment and base URL
      APPLICATION_ENV: development
      SITE_URL: http://localhost:8080

      # Minimal themes/modules set (names or URLs supported)
      OMEKA_THEMES: "default"
      OMEKA_MODULES: |
        Common
        EasyAdmin
        Adminer
        Log

      # Hooks to finish configuration on first boot
      PRE_CONFIGURE_COMMANDS: |
        echo 'Pre-configure hook'
      POST_CONFIGURE_COMMANDS: |
        # Enable the IsolatedSites module from local source first, so the
        # 'site_editor' role it registers is available for the users below.
        omeka-s-cli module:install IsolatedSites || true

        # Demo users for verifying isolation (password "1234" for all):
        #   - editor          : plain editor, no isolation (control, sees everything)
        #   - siteeditor.a / b : site_editor role, each isolated to their own site
        omeka-s-cli user:add "editor@example.com"       "Editor"         editor      "1234" || true
        omeka-s-cli user:add "siteeditor.a@example.com" "Site Editor A"  site_editor "1234" || true
        omeka-s-cli user:add "siteeditor.b@example.com" "Site Editor B"  site_editor "1234" || true

        # Provision the multi-site demo (sites, per-site permissions, isolation
        # settings and sample content) through the Omeka API. The bundled
        # omeka-s-cli cannot create sites/permissions/user-settings yet, so this
        # runs a small script shipped with the module. See data/provision-demo.php.
        php /var/www/html/volume/modules/IsolatedSites/data/provision-demo.php || true

    volumes:
      - omekas_data:/var/www/html/volume:Z
      - ./data:/data:ro
      - ./:/var/www/html/volume/modules/IsolatedSites

  mariadb:
    image: mariadb:latest
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: omeka
      MYSQL_DATABASE: omeka
      MYSQL_USER: omeka
      MYSQL_PASSWORD: omeka
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-homariadb", "-uomeka", "-pomeka"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mariadb_data:
  omekas_data:
